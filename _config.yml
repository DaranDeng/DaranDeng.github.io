# Site configuration
title: DaranDeng
author: Daran Deng
description: "Computer Science learning journey - Notes on data structures, algorithms, operating systems, and more"
url: "https://darandeng.github.io"
baseurl: ""

# Theme
theme: jekyll-theme-cayman

# Markdown and highlighting
markdown: kramdown
kramdown:
  math_engine: mathjax
  syntax_highlighter: rouge

# Build settings
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Exclude from processing
exclude:
  - .github/
  - .vscode/
  - .gitignore
  - Gemfile
  - Gemfile.lock

# Enable all collections
collections:
  posts:
    output: true
    permalink: /:year/:month/:day/:title/
