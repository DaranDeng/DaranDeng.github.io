<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="DaranDeng's personal portfolio - Computer Science notes and learning journey">
  <meta name="theme-color" content="#FFFFFF">
  <title>DaranDeng - Computer Science Learning</title>
  
  <!-- Design System CSS -->
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/design-system.css">
  
  <style>
    /* Landing page specific styles */
    
    body {
      background-color: var(--color-neutral-white);
    }
    
    .hero {
      background: linear-gradient(135deg, var(--color-neutral-white) 0%, var(--color-neutral-cream) 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    
    /* Subtle decorative background pattern */
    .hero::before {
      content: '';
      position: absolute;
      top: 0;
      right: -10%;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, var(--color-material-light) 0%, transparent 70%);
      opacity: 0.15;
      z-index: 0;
    }
    
    .hero-wrapper {
      position: relative;
      z-index: 1;
      text-align: center;
    }
    
    .hero-title {
      font-size: var(--font-size-8xl);
      font-weight: var(--font-weight-bold);
      line-height: 1.1;
      margin-bottom: var(--space-lg);
      color: var(--color-text-primary);
      letter-spacing: var(--letter-spacing-tight);
    }
    
    .hero-byline {
      font-size: var(--font-size-2xl);
      font-weight: var(--font-weight-regular);
      color: var(--color-text-secondary);
      margin-bottom: var(--space-3xl);
      letter-spacing: 2px;
    }
    
    .hero-actions {
      display: flex;
      gap: var(--space-lg);
      justify-content: center;
      flex-wrap: wrap;
    }
    
    .nav-link {
      display: inline-block;
      padding: var(--space-sm) var(--space-md);
      margin: 0 var(--space-sm);
      color: var(--color-text-secondary);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: all var(--transition-fast);
      font-size: var(--font-size-sm);
      letter-spacing: var(--letter-spacing-loose);
    }
    
    .nav-link:hover {
      color: var(--color-accent-primary);
      border-bottom: 1px solid var(--color-accent-primary);
    }
    
    /* Responsive adjustments */
    @media (max-width: 1024px) {
      .hero-title {
        font-size: var(--font-size-6xl);
      }
      
      .hero-byline {
        font-size: var(--font-size-xl);
      }
    }
    
    @media (max-width: 768px) {
      .hero {
        min-height: auto;
        padding: var(--space-2xl) var(--space-lg);
      }
      
      .hero::before {
        width: 400px;
        height: 400px;
      }
      
      .hero-title {
        font-size: var(--font-size-5xl);
        margin-bottom: var(--space-md);
      }
      
      .hero-byline {
        font-size: var(--font-size-lg);
        margin-bottom: var(--space-xl);
      }
      
      .hero-actions {
        gap: var(--space-md);
      }
    }
    
    @media (max-width: 480px) {
      .hero-title {
        font-size: var(--font-size-4xl);
      }
      
      .hero-byline {
        font-size: var(--font-size-md);
      }
      
      .hero-actions {
        flex-direction: column;
        gap: var(--space-md);
      }
      
      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <!-- Hero Section -->
  <section class="hero">
    <div class="hero-wrapper container">
      <h1 class="hero-title">Daran Deng</h1>
      <p class="hero-byline">Computer Science Learning Journey</p>
      
      <div class="hero-actions">
        <a href="/README" class="btn btn-primary">Explore My Notes</a>
        <a href="https://github.com/DaranDeng" class="btn btn-secondary" target="_blank" rel="noopener noreferrer">GitHub Profile</a>
      </div>
    </div>
  </section>
</body>
</html>
