<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Welcome</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Times New Roman', Times, Georgia, serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Background Image - Enhanced Quality */
    .background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
      filter: brightness(1.1) contrast(1.05);
    }

    /* Content Container */
    .container {
      text-align: center;
      color: white;
      padding: 4rem;
      text-shadow: 0 4px 30px rgba(0, 0, 0, 0.6);
    }

    .main-text {
      font-size: 8rem;
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 1.5rem;
      letter-spacing: 12px;
      text-transform: uppercase;
      font-family: 'Times New Roman', Times, serif;
    }

    .author {
      font-size: 2.5rem;
      font-weight: 400;
      margin-bottom: 5rem;
      letter-spacing: 6px;
      opacity: 0.95;
      font-family: 'Times New Roman', Times, serif;
    }

    .buttons {
      display: flex;
      gap: 2rem;
      justify-content: center;
    }

    .btn {
      padding: 1.4rem 4rem;
      font-size: 1.2rem;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      font-weight: 500;
      text-decoration: none;
      display: inline-block;
      outline: none;
      background: transparent;
      color: white;
      border: 2px solid rgba(255, 255, 255, 0.8);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
      font-family: 'Times New Roman', Times, serif;
      letter-spacing: 1px;
      position: relative;
      overflow: hidden;
      text-transform: uppercase;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: left 0.5s;
    }

    .btn:hover::before {
      left: 100%;
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: white;
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
    }

    /* Responsive */
    @media (max-width: 1024px) {
      .main-text {
        font-size: 6rem;
        letter-spacing: 8px;
      }

      .author {
        font-size: 2rem;
      }

      .btn {
        padding: 1.3rem 3.5rem;
        font-size: 1.1rem;
      }
    }

    @media (max-width: 768px) {
      .container {
        padding: 2rem;
      }

      .main-text {
        font-size: 4rem;
        letter-spacing: 6px;
      }

      .author {
        font-size: 1.5rem;
        margin-bottom: 3rem;
      }

      .buttons {
        flex-direction: column;
        gap: 1.5rem;
      }

      .btn {
        width: 280px;
        padding: 1.2rem 3rem;
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <!-- Background Image - Enhanced Quality -->
  <img src="background2.jpg" alt="Background" class="background">

  <!-- Content -->
  <div class="container">
    <h1 class="main-text">Forever Revolutionary<br>Forever Young</h1>
    <p class="author">DAVID SENSEI</p>
    
    <div class="buttons">
      <a href="/README" class="btn">ENTER THE WORLD →</a>
      <a href="https://github.com/DaranDeng" class="btn">GITHUB PROFILE</a>
    </div>
  </div>
</body>
</html>
